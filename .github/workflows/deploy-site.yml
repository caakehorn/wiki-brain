# Build the static wiki + LLM/agent feed and publish to GitHub Pages on
# every push to main. Uses the stdlib-only bin/build-site (no Jekyll, no deps).
name: Deploy wiki site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-wiki
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        env:
          AGENT_BASE_URL: https://caakehorn.github.io/wiki-brain
        run: |
          chmod +x bin/build-site
          python3 bin/build-site --out site
          echo "--- site file count ---"
          find site -type f | wc -l
          ls -lh site/llms.txt site/index.html site/agent/manifest.json site/agent/corpus.md

      - name: Build LLM feed (llm/) and fold into site
        # llm-publish writes to repo root/llm (no --out); the deployable
        # copy must live under site/ so GitHub Pages serves it. Without
        # this, llm/index.txt 404s.
        run: |
          chmod +x bin/llm-publish
          python3 bin/llm-publish
          cp -r llm site/llm
          ls -lh site/llm/index.txt site/llm/manifest.json site/llm/corpus.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
